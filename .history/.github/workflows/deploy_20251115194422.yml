name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'Documentsite/package-lock.json'

      - name: Install dependencies
        working-directory: ./Documentsite
        run: npm ci

      - name: Build Docusaurus site
        working-directory: ./Documentsite
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deployment directory
        run: |
          mkdir -p ./public
          # Copy main site files (excluding Documentsite folder)
          cp index.html ./public/
          cp config.json ./public/
          cp -r dm-spammer ./public/
          cp -r group-dm-spammer ./public/
          cp -r invite-braker ./public/
          cp -r joiner ./public/
          cp -r raider ./public/
          cp -r reaction-spammer ./public/
          cp -r slash-command-auto ./public/
          cp -r status-setter ./public/
          cp -r token-checker ./public/
          cp -r webhook-spammer ./public/
          # Copy built Docusaurus site to help subdirectory
          cp -r ./Documentsite/build ./public/help

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
