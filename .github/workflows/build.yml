name: Build for Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Group builds by workflow and branch, cancel in-progress runs on new pushes
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'Documentsite/package-lock.json'

      - name: Install dependencies
        working-directory: ./Documentsite
        run: npm ci

      - name: Build Docusaurus site
        working-directory: ./Documentsite
        run: npm run build

      - name: Create deployment directory
        run: |
          mkdir -p ./public
          # Copy main site files (excluding Documentsite folder)
          cp index.html ./public/
          cp config.json ./public/
          cp -r dm-spammer ./public/
          cp -r group-dm-spammer ./public/
          cp -r invite-braker ./public/
          cp -r joiner ./public/
          cp -r raider ./public/
          cp -r reaction-spammer ./public/
          cp -r slash-command-auto ./public/
          cp -r status-setter ./public/
          cp -r token-checker ./public/
          cp -r webhook-spammer ./public/
          # Copy built Docusaurus site to help subdirectory
          cp -r ./Documentsite/build ./public/help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./public
